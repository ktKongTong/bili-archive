
watch:
  - id: 睡前消息
    platform:
      bilibili:
        post:
          mid: 316568752
          keywords: 睡前消息
          script: '.github/scripts/scripts/bilibili/马督工.mjs'
          filepath: docs/btnews/{{title}}.md

match:
  - id: Koala聊开源-科技周报
    platform:
      bilibili:
        script: '.github/scripts/bilibili/{{video.owner.name}}.mjs'
        condition:
          owner.mid: 489667127
          title: "科技周报"
        template:
          prompt:
            system: |
              这是一段标题为【{{video.title}}】的视频音频，请识别对应的语言，并转换为对应文本。
              请为文本进行合适的分段，并添加标点符号，段落前后用两个换行符进行分隔。
            user: |
              这是一档科技类周报节目，主要介绍 HackerNews 上发现的新产品/工具，里面包含一些固定搭配/习惯性用语，请参考。
              - 一些固定搭配：【Koala】，【欢迎收看xxx期科技周报】，【了解行业资讯，把握行业脉搏，大家好，我是Koala】
              - 通常为一人播报音频音频。
              - 每期包含若干个不同的产品或工具。
              - 这份音频的标题是【{{ video.title }}】，介绍是【{{video.desc}}】。
              下面是一些需要遵循的要求：
              - 每一期包含多个产品/工具，以每个产品/工具为一节，并根据加上对应的标题，采用三级标题。
              - 每一节可以使用 `---` 进行分隔。
  - id: 睡前消息
    platform:
      bilibili:
        script: .github/scripts/bilibili/{{video.owner.name}}.mjs
        condition:
          owner.name: "马督工"
          title: "睡前消息"
        template:
          filepath: docs/btnews/{{video.title}}.md
          prompt:
            system: |
              这是一段标题为【{{video.title}}】的视频音频，请识别对应的语言，并转换为对应文本。
              请为文本进行合适的分段，并添加标点符号，段落前后用两个换行符进行分隔。
            user: |
              这是一档时事点评类节目，里面包含一些固定搭配，或者习惯性用语，请参考。
              - 音频中通常有两人，一个是静静，一个督工，节目形式通常是一问一答的形式。静静介绍背景，督工进一步播报节目主要内容。
              - 音频开头通常包含：大家好，欢迎收看第xxx期睡前消息，请静静介绍话题。
              - 这份音频的标题是【{{ video.title }}】，介绍是【{{video.desc}}】。
              - 这份音频可能涉及到1~3个不同的话题。通常在介绍中会提到这份音频所涉及的话题，为每个部分加上三级标题，并使用 --- 分割线进行分隔。
              - 每个话题内部可能包含几个小的部分，层层递进，用 memeraid 的方式，画出文章每个部分的逻辑链条。
              此外，音频中往往会包含一部分广告。请识别，并为广告前后使用`@@@` 进行标注。不要对原文进行大幅度的修改。
fallback:
  filepath: docs/{{video.owner.name}}/{{video.title}}.md
  prompt:
    system: |
      这是一段标题为【{{video.title}}】的视频音频，请识别对应的语言，并转换为对应文本。进行合适的分段。
    user: 这是一段文本。
  markdown: |
    ---
    title: "{{ video.title }}"
    description: "{{ video.desc }}"
    tags: []
    date: {{ video.pubdate }}
    bvid: {{ video.bvid }}
    ---
    {{ai.markdown}}
  commit-message: |
    new docs: {{ video.title }}
