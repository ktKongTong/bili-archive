name: bili-batch
on:
  workflow_dispatch:
    inputs:
      mid:
        required: true
        description: "Bilibili member id"
      keywords:
        required: true
        description: "keywords filter"
      prompt:
        description: "prompt"
        default: |
          下面是一段音频，请识别为文本。不要返回额外的内容。
          拆分为合适的段落，并适当的加上标点符号标记。
          段落与段落之间请用两个换行符号分割，段落不宜太松散，也不宜太紧凑。
          请一定不要对原文进行较大幅度的删改、任何删改请务必使用~~~进行标识。
          此外，可能其中部分内容属于不相关的广告部分，请在对应段落前后通过 `@@@` 进行标识。
        required: false
      model:
        description: "gemini model"
        type: choice
        default: "gemini-2.0-flash"
        options:
          - "gemini-2.0-pro-exp-02-05"
          - "gemini-2.0-flash"

env:
  mid: ${{ github.event.inputs.mid }}
  keywords: ${{ github.event.inputs.keywords }}
  prompt: ${{ github.event.inputs.prompt || '下面是一段音频，请识别为文本。不要返回额外的内容。拆分为合适的段落，并适当的加上标点符号标记。段落与段落之间请用两个换行符号分割，段落不宜太松散，也不宜太紧凑。请一定不要对原文进行较大幅度的删改、任何删改请务必使用~~~进行标识。此外，可能其中部分内容属于不相关的广告部分，请在对应段落前后通过 `@@@` 进行标识。' }}
  model: ${{ github.event.inputs.model || 'gemini-2.0-pro-exp-02-05' }}
jobs:
  batch-get-video:
    runs-on: ubuntu-latest
    outputs:
      videos: ${{ steps.set-result.outputs.result }}
    steps:
      - name: get and download video
        id: bili
        uses: ktKongTong/bili-action@v0.2.6
        with:
          mid: ${{ env.mid }}
          keyword: ${{ env.keywords }}
          batch: true
      - name: show result
        run: echo "${{join(fromJSON(steps.bili.outputs.batch).*.bvid)}}"
      - uses: actions/github-script@v7
        id: set-result
        with:
          script: | 
            const bvids = "${{ join(fromJSON(steps.bili.outputs.batch).*.bvid) }}"
            const allId = bvids.split(',')
            // const chunk1 = allId.slice(0, 250)
            // const chunk2 = allId.slice(250, 500)
            // const chunk3 = allId.slice(500, 750)
            // const chunk4 = allId.slice(750, 1000)
            const chunk1 = allId.slice(0, 2)
            const chunk2 = allId.slice(2, 4)
            const chunk3 = allId.slice(4, 6)
            const chunk4 = allId.slice(6, 8)
            return [chunk1, chunk2, chunk3, chunk4]
      - name: Get result
        run: echo "${{steps.set-result.outputs.result}}"
      - name: create-branch
        uses: peterjgrainger/action-create-branch@v2.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        with:
          branch: 'batch/${{env.mid}}/${{env.keywords}}'
  get-video-chunk-1:
    needs: [batch-get-video]
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      max-parallel: 2
      matrix: # maximum of 256 configurations
        bvid: ${{ fromJSON(needs.batch-get-video.outputs.videos)[0] }}
    steps:
      - name: show result
        run: echo "current bvid ${{ matrix.bvid }}"
      - uses: actions/checkout@v4
        with:
          ref: 'batch/${{env.mid}}/${{env.keywords}}'
          token: ${{ secrets.PAT }}
      - name: get content
        uses: ./.github/actions/bili-fetch
        with:
          token: ${{ secrets.GEMINI_TOKEN }}
          github-token: ${{ secrets.PAT }}
          model: ${{ env.model }}
          prompt: ${{ env.prompt }}
          bvid: ${{ matrix.bvid }}
          bili-proxy: ${{ secrets.BILI_STREAM_PROXY }}
          exec-even-exist: 'true'
          branch: 'batch/${{env.mid}}/${{env.keywords}}'
          message: ":memo: new docs ${{ steps.bili.outputs.title }}"
  get-video-chunk-2:
    needs: [batch-get-video]
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      max-parallel: 2
      matrix: # maximum of 256 configurations
        bvid: ${{ fromJSON(needs.batch-get-video.outputs.videos)[1] }}
    steps:
      - name: show result
        run: echo "current bvid ${{ matrix.bvid }}"
      - uses: actions/checkout@v4
        with:
          ref: 'batch/${{env.mid}}/${{env.keywords}}'
          token: ${{ secrets.PAT }}
      - name: get content
        uses: ./.github/actions/bili-fetch
        with:
          token: ${{ secrets.GEMINI_TOKEN }}
          github-token: ${{ secrets.PAT }}
          model: ${{ env.model }}
          prompt: ${{ env.prompt }}
          bvid: ${{ matrix.bvid }}
          bili-proxy: ${{ secrets.BILI_STREAM_PROXY }}
          exec-even-exist: 'true'
          branch: 'batch/${{env.mid}}/${{env.keywords}}'
          message: ":memo: new docs ${{ steps.bili.outputs.title }}"
  get-video-chunk-3:
    needs: [batch-get-video]
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      max-parallel: 2
      matrix: # maximum of 256 configurations
        bvid: ${{ fromJSON(needs.batch-get-video.outputs.videos)[2] }}
    steps:
      - name: show result
        run: echo "current bvid ${{ matrix.bvid }}"
      - uses: actions/checkout@v4
        with:
          ref: 'batch/${{env.mid}}/${{env.keywords}}'
          token: ${{ secrets.PAT }}
      - name: get content
        uses: ./.github/actions/bili-fetch
        with:
          token: ${{ secrets.GEMINI_TOKEN }}
          github-token: ${{ secrets.PAT }}
          model: ${{ env.model }}
          prompt: ${{ env.prompt }}
          bvid: ${{ matrix.bvid }}
          bili-proxy: ${{ secrets.BILI_STREAM_PROXY }}
          exec-even-exist: 'true'
          branch: 'batch/${{env.mid}}/${{env.keywords}}'
          message: ":memo: new docs ${{ steps.bili.outputs.title }}"
  get-video-chunk-4:
    needs: [batch-get-video]
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      max-parallel: 2
      matrix: # maximum of 256 configurations
        bvid: ${{ fromJSON(needs.batch-get-video.outputs.videos)[3] }}
    steps:
      - name: show result
        run: echo "current bvid ${{ matrix.bvid }}"
      - uses: actions/checkout@v4
        with:
          ref: 'batch/${{env.mid}}/${{env.keywords}}'
          token: ${{ secrets.PAT }}
      - name: get content
        uses: ./.github/actions/bili-fetch
        with:
          token: ${{ secrets.GEMINI_TOKEN }}
          github-token: ${{ secrets.PAT }}
          model: ${{ env.model }}
          prompt: ${{ env.prompt }}
          bvid: ${{ matrix.bvid }}
          bili-proxy: ${{ secrets.BILI_STREAM_PROXY }}
          exec-even-exist: 'true'
          branch: 'batch/${{env.mid}}/${{env.keywords}}'
          message: ":memo: new docs ${{ steps.bili.outputs.title }}"