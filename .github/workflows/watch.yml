name: Watch
on:
#  schedule:
#    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  watch:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.set-output.outputs.TARGET_MATRIX }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/watch-action
        id: watch
      - name: Set output
        id: set-output
        run: |
          echo "TARGET_MATRIX=$(echo '${{ steps.watch.outputs.result }}' | jq '.[0:4]' | jq -r 'tostring')" >> $GITHUB_OUTPUT
          echo 'Watch result: ${{ steps.watch.outputs.result }}'
  fetch:
    needs: watch
    strategy:
      matrix:
        event: ${{ fromJSON(needs.watch.outputs.result) }}
#    runs-on: ubuntu-latest
#    steps:
#      - name: show matrix
#        run: echo 'matrix ${{toJSON(matrix.event)}}'
    uses: ./.github/workflows/bili-v2.yml
    with:
      exec-even-exist: false
      bvid: ${{ fromJSON(matrix.event).payload.bvid }}
      filepath-template: ${{ fromJSON(matrix.event).payload.presetFilepathTemplate }}
      markdown-template: ${{ fromJSON(matrix.event).payload.presetMarkdownTemplate }}
      prompt-template: ${{ fromJSON(matrix.event).payload.presetPromptTemplate }}
      system-prompt-template: ${{ fromJSON(matrix.event).payload.presetSystemPromptTemplate }}